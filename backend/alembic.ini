# Alembic config for agentX backend.
#
# The actual DB URL is resolved at runtime by app.db.engine.resolve_database_url
# (DATABASE_URL env > settings.sqlite_path > sqlite:///./stockpilot.db).
# We deliberately leave sqlalchemy.url empty here so that operators don't
# accidentally migrate the wrong database by editing this file.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
